<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Card</title>
    <style>
        body{
            background-image: url(https://tse1.mm.bing.net/th/id/OIP.vH4Yc2FspH_FjY5W9MMZrAHaEK?rs=1&pid=ImgDetMain&o=7&rm=3);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        .card{
            background-color: rgb(6, 5, 73);
            color:white;
            width: 350px;
            padding: 15px;
            border: solid rgb(132, 140, 172) 2px;
            border-radius: 10px;
            box-shadow:5px 5px 10px;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .btn{
            margin: 5px;
            background-color:rgb(10, 8, 106);
            color:white;
            width: 100px;
            text-align: center;
            align-self: center;
        }
        
    </style>
</head>
<body>
    <div class="card">
            <h1>Aryan Sonsurkar</h1>
            <p>Full Stack Developer</p>
            <p>Python | OpenCV</p>
            <a class="btn" href="https://github.com/aryan-sonsurkar">Github</a>
            <a class="btn" href="https://www.linkedin.com/in/aryan-sonsurkar/" target="_blank">LinkedIn</a>
    </div>
</body>
</html>
